<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheLivesWithUs</title>
  </head>
  <body>
    <script>
      // GitHub Pages SPA fallback for BrowserRouter.
      // Store the attempted URL and redirect to the project root; index.html restores it.
      (function () {
        var loc = window.location
        try {
          sessionStorage.setItem('gh_pages_path', loc.pathname + loc.search + loc.hash)
        } catch (e) {}
        loc.replace(loc.origin + '/HerEntertainment3/')
      })()
    </script>
  </body>
</html>
